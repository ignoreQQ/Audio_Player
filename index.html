<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日文歌曲</title>
  <style>
    /* === 基礎樣式 === */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f7;
      color: #333;
      margin: 0;
      padding: 20px;
      padding-bottom: 120px;
    }
    
    /* === 歌詞區樣式 === */
    .lyric-line {
      margin: 30px 0;
      padding-left: 10px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      opacity: 0.4;
    }
    .lyric-line.active {
      opacity: 1;
      transform: translateX(15px) scale(1.05);
    }
    ruby { font-size: 24px; font-weight: bold; margin-right: 5px; }
    rt { font-size: 12px; color: #007aff; }
    .translation { font-size: 16px; margin-top: 8px; }

    /* === 播放器底列 === */
    .player-bar {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px 20px; box-sizing: border-box;
      border-top: 1px solid #ddd;
    }
    audio { width: 100%; }

    /* === SPA 畫面切換樣式 === */
    .view { display: none; }
    .view.active { display: block; }
    
    .menu-btn {
      display: block; width: 80%; margin: 20px auto; padding: 15px;
      font-size: 18px; background-color: #007aff; color: white;
      border: none; border-radius: 12px; cursor: pointer;
    }
    .menu-btn.favorite-btn { background-color: #ff2d55; }
    
    /* === 曲庫與搜尋樣式 === */
    .header { display: flex; align-items: center; margin-bottom: 15px; }
    .header button { margin-right: 15px; padding: 8px 12px; border: none; border-radius: 8px; background: #ddd; cursor: pointer;}
    
    #search-input {
      width: 100%; margin-bottom: 15px; padding: 10px;
      font-size: 16px; border-radius: 8px; border: 1px solid #ccc;
      box-sizing: border-box;
    }
    #song-list { list-style: none; padding: 0; margin: 0; }
    .song-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 10px; border-bottom: 1px solid #eee; cursor: pointer;
    }
    .fav-icon { font-size: 28px; color: #ccc; padding-left: 20px;}
    .fav-icon.active { color: #ff2d55; }
  </style>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日文歌">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./Service_Worker.js');
      });
    }
  </script>
</head>
<body>

  <div id="home-view" class="view active">
    <h1 style="text-align: center; margin-top: 50px;">🎵 日文歌學習</h1>
    <div class="menu-container">
      <button class="menu-btn" onclick="showLibrary(false)">進入曲庫 (全部歌曲)</button>
      <button class="menu-btn favorite-btn" onclick="showLibrary(true)">我的收藏</button>
    </div>
  </div>

  <div id="library-view" class="view">
    <div class="header">
      <button onclick="showHome()">⬅ 返回</button>
      <h2 id="library-title" style="margin:0;">全部歌曲</h2>
    </div>
    <input type="text" id="search-input" placeholder="搜尋歌名或歌手..." onkeyup="filterSongs()">
    <ul id="song-list"></ul>
  </div>

  <div id="player-view" class="view">
    <div class="header">
      <button onclick="showLibrary(currentIsFavorites)">⬅ 返回曲庫</button>
      <h2 id="player-title" style="margin:0;">播放中</h2>
    </div>
    <div id="lyrics-container">請先選擇一首歌曲</div>
    <div class="player-bar">
      <audio id="audio-player" controls preload="metadata"></audio>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 資料區：滿滿的曲庫 (換成你真實的 GitHub 連結)
    // ==========================================
    const allSongs = [
      { 
        id: "s1", title: "Lemon", artist: "米津玄師", 
        audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/Lemon.mp3", 
        lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/Lemon.json" 
      },
      { 
        id: "s2", title: "ベテルギウス", artist: "優里Yuuri", 
        audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/%E3%83%99%E3%83%86%E3%83%AB%E3%82%AE%E3%82%A6%E3%82%B9.mp3", 
        lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/%E3%83%99%E3%83%86%E3%83%AB%E3%82%AE%E3%82%A6%E3%82%B9.json" 
      },
      { 
        id: "s3", title: "Teacher", artist: "友成空", 
        audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/Teacher.mp3", 
        lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/Teacher.json" 
      }
    ];

    let currentIsFavorites = false;
    let favoriteIds = JSON.parse(localStorage.getItem('myFavSongs')) || [];
    
    // 播放器相關變數
    let lyricsData = [];
    let currentLineIndex = -1;
    const audioPlayer = document.getElementById('audio-player');
    const lyricsContainer = document.getElementById('lyrics-container');

    // ==========================================
    // 2. 畫面切換與清單邏輯
    // ==========================================
    function hideAllViews() {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    }

    function showHome() {
      hideAllViews();
      document.getElementById('home-view').classList.add('active');
    }

    function showLibrary(onlyFavorites) {
      hideAllViews();
      currentIsFavorites = onlyFavorites;
      document.getElementById('library-view').classList.add('active');
      document.getElementById('library-title').innerText = onlyFavorites ? "我的收藏" : "全部歌曲";
      document.getElementById('search-input').value = "";
      renderSongList();
    }

    function renderSongList(searchQuery = "") {
      const listContainer = document.getElementById('song-list');
      listContainer.innerHTML = ''; 

      let filteredSongs = allSongs.filter(song => {
        if (currentIsFavorites && !favoriteIds.includes(song.id)) return false;
        const query = searchQuery.toLowerCase();
        return song.title.toLowerCase().includes(query) || song.artist.toLowerCase().includes(query);
      });

      filteredSongs.forEach(song => {
        const li = document.createElement('li');
        li.className = 'song-item';
        
        const isFav = favoriteIds.includes(song.id);
        const starClass = isFav ? "fav-icon active" : "fav-icon";
        const starSymbol = isFav ? "♥" : "♡";

        li.innerHTML = `
          <div style="flex-grow: 1;" onclick="playSong('${song.id}')">
            <div style="font-size: 18px; font-weight: bold;">${song.title}</div>
            <div style="font-size: 14px; color: gray;">${song.artist}</div>
          </div>
          <div class="${starClass}" onclick="toggleFavorite('${song.id}', event)">${starSymbol}</div>
        `;
        listContainer.appendChild(li);
      });
    }

    function filterSongs() {
      renderSongList(document.getElementById('search-input').value);
    }

    function toggleFavorite(songId, event) {
      event.stopPropagation(); 
      if (favoriteIds.includes(songId)) {
        favoriteIds = favoriteIds.filter(id => id !== songId);
      } else {
        favoriteIds.push(songId);
      }
      localStorage.setItem('myFavSongs', JSON.stringify(favoriteIds));
      filterSongs(); 
    }

    // ==========================================
    // 3. 播放與歌詞解析邏輯
    // ==========================================
    function playSong(songId) {
      const song = allSongs.find(s => s.id === songId);
      
      hideAllViews();
      document.getElementById('player-view').classList.add('active');
      document.getElementById('player-title').innerText = song.title;
      
      // 設定音樂與載入歌詞
      audioPlayer.src = song.audio;
      fetchLyrics(song.lyrics);
      audioPlayer.play();

      // 設定手機鎖定畫面的控制資訊 (Media Session API)
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: song.title,
          artist: song.artist,
          album: '日文歌學習',
          artwork: [{ src: 'icon-512.png', sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
        navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
      }
    }

    async function fetchLyrics(url) {
      lyricsContainer.innerHTML = '歌詞載入中...';
      currentLineIndex = -1; // 重置狀態
      try {
        const response = await fetch(url);
        lyricsData = await response.json();
        renderLyrics();
      } catch (error) {
        lyricsContainer.innerHTML = "歌詞載入失敗";
      }
    }

    function renderLyrics() {
      lyricsContainer.innerHTML = ''; 
      lyricsData.forEach((line, index) => {
        const lineDiv = document.createElement('div');
        lineDiv.className = 'lyric-line';
        lineDiv.id = `line-${index}`;
        
        let wordsHTML = '';
        line.words.forEach(word => {
          wordsHTML += `<ruby>${word.text}<rt>${word.furigana || ''}</rt></ruby>`;
        });

        lineDiv.innerHTML = `
          <div>${wordsHTML}</div>
          <div class="translation">${line.translation}</div>
        `;

        lineDiv.addEventListener('click', () => {
          audioPlayer.currentTime = line.startTime + 0.05;
          audioPlayer.play();
        });

        lyricsContainer.appendChild(lineDiv);
      });
    }

    // 監聽播放時間並自動滾動
    audioPlayer.addEventListener('timeupdate', () => {
      const currentTime = audioPlayer.currentTime;
      let activeIndex = -1;
      for (let i = lyricsData.length - 1; i >= 0; i--) {
        if (currentTime >= lyricsData[i].startTime) {
          activeIndex = i;
          break;
        }
      }

      if (activeIndex !== currentLineIndex && activeIndex !== -1) {
        if (currentLineIndex !== -1) {
          const oldLine = document.getElementById(`line-${currentLineIndex}`);
          if(oldLine) oldLine.classList.remove('active');
        }
        
        currentLineIndex = activeIndex;
        const activeLine = document.getElementById(`line-${currentLineIndex}`);
        if(activeLine) {
          activeLine.classList.add('active');
          activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    });

  </script>
</body>
</html>
