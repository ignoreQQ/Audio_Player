<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日文歌學習</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <link rel="stylesheet" href="style.css">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./Service_Worker.js');
      });
    }
  </script>
</head>
<body>

  <audio id="audio-player" preload="metadata"></audio>

  <div id="home-view" class="view active">
    <div style="text-align: center; margin: 60px 0;">
      <h1 style="font-size: 32px; letter-spacing: 2px;">🎵<br>日文歌學習</h1>
    </div>
    <div class="menu-container">
      <button class="liquid-btn" onclick="showLibrary(false)">進入曲庫 (全部歌曲)</button>
      <button class="liquid-btn" onclick="showLibrary(true)">我的收藏 🤍</button>
    </div>
  </div>

  <div id="library-view" class="view">
    <div class="header">
      <button class="back-btn glass-panel" onclick="showHome()">❮ 返回</button>
      <h2 id="library-title" style="margin:0 0 0 15px;">全部歌曲</h2>
    </div>
    <input type="text" id="search-input" placeholder="🔍 搜尋歌名或歌手..." onkeyup="filterSongs()">
    <ul id="song-list"></ul>
  </div>

  <div id="player-view" class="view">
    <div class="header">
      <button class="back-btn glass-panel" onclick="showLibrary(currentIsFavorites)">❮ 返回清單</button>
    </div>
    <div id="lyrics-container">請先選擇一首歌曲</div>
  </div>

  <div id="global-player" class="glass-panel">
    <div class="player-info" onclick="showPlayerView()">
      <div class="player-title" id="ui-title">--</div>
      <div class="player-artist" id="ui-artist">--</div>
    </div>

    <div class="progress-wrapper">
      <input type="range" id="progress-bar" value="0" max="100">
      <div class="time-labels">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="playPrevious()">⏮</button>
      
      <button class="ctrl-btn play-pause-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
      
      <button class="ctrl-btn" onclick="playNext()">⏭</button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
    </div>

    <div class="volume-container">
      <span id="volume-icon" onclick="toggleMute()">🔊</span>
      <input type="range" id="volume-bar" value="100" max="100">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
