<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日文歌學習</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./Service_Worker.js');
      });
    }
  </script>

  <style>
    /* === 1. 動態柔和背景 === */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(-45deg, #e0eafc, #cfdef3, #e8f5e9, #f3e5f5);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #1d1d1f;
      padding-bottom: 180px;
      overflow-x: hidden;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* === 2. 玻璃態按鈕 === */
    .glass-panel {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }
    .liquid-btn {
      display: block; width: 85%; margin: 20px auto; padding: 18px;
      font-size: 18px; font-weight: 600; color: #1d1d1f;
      border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      cursor: pointer; transition: all 0.3s ease;
    }
    .liquid-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.6); }

    /* === 3. 全域客製化播放器 === */
    #global-player {
      position: fixed; bottom: 0; left: 0; width: 100%;
      padding: 15px 20px 25px 20px; box-sizing: border-box;
      border-top-left-radius: 30px; border-top-right-radius: 30px;
      z-index: 1000; display: none;
      transition: transform 0.3s ease;
    }
    .player-info { text-align: center; margin-bottom: 15px; cursor: pointer; }
    .player-title { font-weight: bold; font-size: 16px; }
    .player-artist { font-size: 12px; color: #666; }
    
    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 10px; }
    .ctrl-btn {
      background: none; border: none; font-size: 24px; color: #1d1d1f; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 45px; height: 45px; border-radius: 50%; transition: 0.2s;
    }
    .ctrl-btn:active { background: rgba(0,0,0,0.1); }
    .play-pause-btn { font-size: 32px; width: 55px; height: 55px; background: rgba(255,255,255,0.8); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .skip-text { font-size: 10px; font-weight: bold; margin-top: -2px;}
    
    /* 重複按鈕特殊樣式 */
    #repeat-btn { font-size: 20px; opacity: 0.6; }
    #repeat-btn.active { opacity: 1; transform: scale(1.1); }

    /* 進度條 & 音量條通用設定 */
    .progress-container, .volume-container { 
      display: flex; align-items: center; gap: 10px; 
      font-size: 12px; font-family: monospace; color: #555; 
    }
    .volume-container { justify-content: center; margin-top: 15px; padding: 0 10%; }
    #volume-icon { font-size: 18px; cursor: pointer; width: 24px; text-align: center; }

    input[type=range] {
      flex-grow: 1; -webkit-appearance: none; height: 6px; border-radius: 3px;
      background: rgba(0,0,0,0.1); outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: #1d1d1f; cursor: pointer; transition: 0.2s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }
    #volume-bar { flex-grow: 0.8; }

    /* === 4. 版面與歌詞樣式 === */
    .view { display: none; padding: 20px; }
    .view.active { display: block; }
    .header { display: flex; align-items: center; margin-bottom: 20px; }
    .back-btn { padding: 10px 15px; border: none; border-radius: 15px; background: rgba(255,255,255,0.5); cursor: pointer; font-weight: bold; }
    
    #search-input {
      width: 100%; padding: 15px; font-size: 16px; border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); margin-bottom: 20px; outline: none; box-sizing: border-box;
    }
    #song-list { list-style: none; padding: 0; margin: 0; }
    .song-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px; margin-bottom: 12px; border-radius: 20px; cursor: pointer; transition: 0.2s;
    }
    .song-item:active { transform: scale(0.98); }
    .fav-icon { font-size: 24px; color: rgba(0,0,0,0.2); padding: 10px; }
    .fav-icon.active { color: #ff2d55; }

    .lyric-line { margin: 30px 0; padding-left: 10px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; opacity: 0.4; }
    .lyric-line.active { opacity: 1; transform: translateX(15px) scale(1.05); }
    ruby { font-size: 24px; font-weight: bold; margin-right: 5px; }
    rt { font-size: 12px; color: #007aff; }
    .translation { font-size: 16px; margin-top: 8px; }
  </style>
</head>
<body>

  <audio id="audio-player" preload="metadata"></audio>

  <div id="home-view" class="view active">
    <div style="text-align: center; margin: 60px 0;">
      <h1 style="font-size: 32px; letter-spacing: 2px;">🎵<br>日文歌學習</h1>
    </div>
    <div class="menu-container">
      <button class="liquid-btn" onclick="showLibrary(false)">進入曲庫 (全部歌曲)</button>
      <button class="liquid-btn" onclick="showLibrary(true)">我的收藏 🤍</button>
    </div>
  </div>

  <div id="library-view" class="view">
    <div class="header">
      <button class="back-btn glass-panel" onclick="showHome()">❮ 返回</button>
      <h2 id="library-title" style="margin:0 0 0 15px;">全部歌曲</h2>
    </div>
    <input type="text" id="search-input" placeholder="🔍 搜尋歌名或歌手..." onkeyup="filterSongs()">
    <ul id="song-list"></ul>
  </div>

  <div id="player-view" class="view">
    <div class="header">
      <button class="back-btn glass-panel" onclick="showLibrary(currentIsFavorites)">❮ 返回清單</button>
    </div>
    <div id="lyrics-container">請先選擇一首歌曲</div>
  </div>

  <div id="global-player" class="glass-panel">
    <div class="player-info" onclick="showPlayerView()">
      <div class="player-title" id="ui-title">--</div>
      <div class="player-artist" id="ui-artist">--</div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
      
      <button class="ctrl-btn" onclick="playPrevious()">⏮</button>
      <button class="ctrl-btn" onclick="skipTime(-10)">
        <div style="display:flex; flex-direction:column; align-items:center;">
          <span>↺</span><span class="skip-text">-10</span>
        </div>
      </button>
      <button class="ctrl-btn play-pause-btn" id="play-pause-btn" onclick="togglePlay()">▶️</button>
      <button class="ctrl-btn" onclick="skipTime(10)">
        <div style="display:flex; flex-direction:column; align-items:center;">
          <span>↻</span><span class="skip-text">+10</span>
        </div>
      </button>
      <button class="ctrl-btn" onclick="playNext()">⏭</button>
    </div>

    <div class="progress-container">
      <span id="time-current">0:00</span>
      <input type="range" id="progress-bar" value="0" max="100">
      <span id="time-total">0:00</span>
    </div>

    <div class="volume-container">
      <span id="volume-icon" onclick="toggleMute()">🔊</span>
      <input type="range" id="volume-bar" value="100" max="100">
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 曲庫資料庫 (真實連結)
    // ==========================================
    const allSongs = [
      { id: "s1", title: "Lemon", artist: "米津玄師", audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/Lemon.mp3", lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/Lemon.json" },
      { id: "s2", title: "ベテルギウス", artist: "優里Yuuri", audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/%E3%83%99%E3%83%86%E3%83%AB%E3%82%AE%E3%82%A6%E3%82%B9.mp3", lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/%E3%83%99%E3%83%86%E3%83%AB%E3%82%AE%E3%82%A6%E3%82%B9.json" },
      { id: "s3", title: "Teacher", artist: "友成空", audio: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Music/Teacher.mp3", lyrics: "https://raw.githubusercontent.com/ignoreQQ/Music/main/Lyrics/Teacher.json" }
    ];

    let currentIsFavorites = false;
    let favoriteIds = JSON.parse(localStorage.getItem('myFavSongs')) || [];
    let currentSongIndexInList = 0;
    let currentPlaylist = [];

    const audioPlayer = document.getElementById('audio-player');
    const lyricsContainer = document.getElementById('lyrics-container');
    const globalPlayer = document.getElementById('global-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const progressBar = document.getElementById('progress-bar');
    const timeCurrentLabel = document.getElementById('time-current');
    const timeTotalLabel = document.getElementById('time-total');
    
    let lyricsData = [];
    let currentLineIndex = -1;
    let isDragging = false;
    
    // 新增：重複播放模式 (0: 全部循環, 1: 單曲循環)
    let repeatMode = 0; 
    const repeatBtn = document.getElementById('repeat-btn');

    // ==========================================
    // 2. 視圖切換
    // ==========================================
    function hideAllViews() {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    }
    function showHome() { hideAllViews(); document.getElementById('home-view').classList.add('active'); }
    function showLibrary(onlyFavorites) {
      hideAllViews();
      currentIsFavorites = onlyFavorites;
      document.getElementById('library-view').classList.add('active');
      document.getElementById('library-title').innerText = onlyFavorites ? "我的收藏" : "全部歌曲";
      document.getElementById('search-input').value = "";
      renderSongList();
    }
    function showPlayerView() {
      hideAllViews();
      document.getElementById('player-view').classList.add('active');
    }

    // ==========================================
    // 3. 曲庫清單邏輯
    // ==========================================
    function renderSongList(searchQuery = "") {
      const listContainer = document.getElementById('song-list');
      listContainer.innerHTML = ''; 

      currentPlaylist = allSongs.filter(song => {
        if (currentIsFavorites && !favoriteIds.includes(song.id)) return false;
        const query = searchQuery.toLowerCase();
        return song.title.toLowerCase().includes(query) || song.artist.toLowerCase().includes(query);
      });

      currentPlaylist.forEach((song, index) => {
        const li = document.createElement('li');
        li.className = 'song-item glass-panel';
        const isFav = favoriteIds.includes(song.id);
        const starClass = isFav ? "fav-icon active" : "fav-icon";
        const starSymbol = isFav ? "♥" : "♡";

        li.innerHTML = `
          <div style="flex-grow: 1;" onclick="playSong(${index})">
            <div style="font-size: 18px; font-weight: bold;">${song.title}</div>
            <div style="font-size: 14px; color: #555;">${song.artist}</div>
          </div>
          <div class="${starClass}" onclick="toggleFavorite('${song.id}', event)">${starSymbol}</div>
        `;
        listContainer.appendChild(li);
      });
    }

    function filterSongs() { renderSongList(document.getElementById('search-input').value); }

    function toggleFavorite(songId, event) {
      event.stopPropagation(); 
      if (favoriteIds.includes(songId)) favoriteIds = favoriteIds.filter(id => id !== songId);
      else favoriteIds.push(songId);
      localStorage.setItem('myFavSongs', JSON.stringify(favoriteIds));
      filterSongs(); 
    }

    // ==========================================
    // 4. 音量控制邏輯
    // ==========================================
    const volumeBar = document.getElementById('volume-bar');
    const volumeIcon = document.getElementById('volume-icon');
    
    let savedVolume = localStorage.getItem('mySavedVolume');
    if (savedVolume !== null) {
      audioPlayer.volume = parseFloat(savedVolume);
      volumeBar.value = audioPlayer.volume * 100;
      updateVolumeIcon(audioPlayer.volume);
    }

    volumeBar.addEventListener('input', (e) => {
      const vol = e.target.value / 100;
      audioPlayer.volume = vol;
      localStorage.setItem('mySavedVolume', vol);
      updateVolumeIcon(vol);
    });

    function toggleMute() {
      if (audioPlayer.volume > 0) {
        audioPlayer.dataset.lastVol = audioPlayer.volume;
        audioPlayer.volume = 0;
        volumeBar.value = 0;
      } else {
        const restoreVol = audioPlayer.dataset.lastVol || 1;
        audioPlayer.volume = restoreVol;
        volumeBar.value = restoreVol * 100;
      }
      localStorage.setItem('mySavedVolume', audioPlayer.volume);
      updateVolumeIcon(audioPlayer.volume);
    }

    function updateVolumeIcon(vol) {
      if (vol === 0) volumeIcon.innerText = '🔇';
      else if (vol < 0.5) volumeIcon.innerText = '🔉';
      else volumeIcon.innerText = '🔊';
    }

    // ==========================================
    // 5. 播放控制與進度條
    // ==========================================
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function playSong(index) {
      if (index < 0 || index >= currentPlaylist.length) return;
      currentSongIndexInList = index;
      const song = currentPlaylist[index];
      
      document.getElementById('ui-title').innerText = song.title;
      document.getElementById('ui-artist').innerText = song.artist;
      globalPlayer.style.display = 'block'; 
      showPlayerView(); 
      
      audioPlayer.src = song.audio;
      fetchLyrics(song.lyrics);
      audioPlayer.play();
      playPauseBtn.innerText = '⏸';

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: song.title, artist: song.artist, album: '日文歌學習',
          artwork: [{ src: 'icon-512.png', sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
        navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => playPrevious());
        navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
      }
    }

    function togglePlay() {
      if (audioPlayer.paused) {
        audioPlayer.play();
        playPauseBtn.innerText = '⏸';
      } else {
        audioPlayer.pause();
        playPauseBtn.innerText = '▶️';
      }
    }

    // 新增：切換重複模式
    function toggleRepeat() {
      repeatMode = (repeatMode + 1) % 2;
      if (repeatMode === 0) {
        repeatBtn.innerText = '🔁'; // 全部循環
        repeatBtn.classList.remove('active');
      } else {
        repeatBtn.innerText = '🔂'; // 單曲循環
        repeatBtn.classList.add('active');
      }
    }

    function skipTime(seconds) { audioPlayer.currentTime += seconds; }

    function playNext() {
      let nextIndex = currentSongIndexInList + 1;
      if (nextIndex >= currentPlaylist.length) nextIndex = 0;
      playSong(nextIndex);
    }

    function playPrevious() {
      let prevIndex = currentSongIndexInList - 1;
      if (prevIndex < 0) prevIndex = currentPlaylist.length - 1;
      playSong(prevIndex);
    }

    audioPlayer.addEventListener('loadedmetadata', () => {
      timeTotalLabel.innerText = formatTime(audioPlayer.duration);
    });

    audioPlayer.addEventListener('timeupdate', () => {
      // 修正：依據重複模式決定下一首歌
      if (audioPlayer.ended) { 
        if (repeatMode === 1) {
          // 單曲循環：拉回開頭繼續播
          audioPlayer.currentTime = 0;
          audioPlayer.play();
        } else {
          // 全部循環：播下一首
          playPauseBtn.innerText = '▶️'; 
          playNext(); 
        }
      }
      
      if (!isDragging && audioPlayer.duration) {
        const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressBar.value = percent;
        timeCurrentLabel.innerText = formatTime(audioPlayer.currentTime);
      }

      const currentTime = audioPlayer.currentTime;
      let activeIndex = -1;
      for (let i = lyricsData.length - 1; i >= 0; i--) {
        if (currentTime >= lyricsData[i].startTime) { activeIndex = i; break; }
      }
      if (activeIndex !== currentLineIndex && activeIndex !== -1) {
        if (currentLineIndex !== -1) {
          const oldLine = document.getElementById(`line-${currentLineIndex}`);
          if(oldLine) oldLine.classList.remove('active');
        }
        currentLineIndex = activeIndex;
        const activeLine = document.getElementById(`line-${currentLineIndex}`);
        if(activeLine) {
          activeLine.classList.add('active');
          activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    });

    progressBar.addEventListener('input', (e) => {
      isDragging = true;
      const targetTime = (e.target.value / 100) * audioPlayer.duration;
      timeCurrentLabel.innerText = formatTime(targetTime);
    });
    progressBar.addEventListener('change', (e) => {
      isDragging = false;
      audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
    });

    // ==========================================
    // 6. 歌詞動態載入
    // ==========================================
    async function fetchLyrics(url) {
      lyricsContainer.innerHTML = '<div style="text-align:center; color:#888;">歌詞載入中...</div>';
      currentLineIndex = -1;
      try {
        const response = await fetch(url);
        lyricsData = await response.json();
        lyricsContainer.innerHTML = ''; 
        lyricsData.forEach((line, index) => {
          const lineDiv = document.createElement('div');
          lineDiv.className = 'lyric-line';
          lineDiv.id = `line-${index}`;
          let wordsHTML = '';
          line.words.forEach(word => { wordsHTML += `<ruby>${word.text}<rt>${word.furigana || ''}</rt></ruby>`; });
          lineDiv.innerHTML = `<div>${wordsHTML}</div><div class="translation">${line.translation}</div>`;
          lineDiv.addEventListener('click', () => { 
            audioPlayer.currentTime = line.startTime + 0.05; 
            audioPlayer.play(); 
            playPauseBtn.innerText = '⏸'; 
          });
          lyricsContainer.appendChild(lineDiv);
        });
      } catch (error) {
        lyricsContainer.innerHTML = "歌詞載入失敗";
      }
    }
  </script>
</body>
</html>
